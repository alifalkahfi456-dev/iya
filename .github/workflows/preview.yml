name: Dart Preview

on:
  repository_dispatch:
    types: [dart_preview]

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.8"
          channel: "stable"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Run golden test
        run: |
          flutter test --update-goldens --reporter=expanded test/preview_test.dart > preview_log.txt 2>&1 || true
          cat preview_log.txt

      - name: Upload preview PNG
        uses: actions/upload-artifact@v4
        with:
          name: preview-${{ github.event.client_payload.job_id }}
          path: test/goldens/preview_output.png
          retention-days: 1
          if-no-files-found: warn

      - name: Upload preview log (selalu, buat debug kalau PNG gagal)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-log-${{ github.event.client_payload.job_id }}
          path: preview_log.txt
          retention-days: 1
          if-no-files-found: warn
          
